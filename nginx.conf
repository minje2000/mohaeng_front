
# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name mohaeng.com;

    return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name mohaeng.com;

    # SSL 인증서 
    ssl_certificate /etc/letsencrypt/live/mohaeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mohaeng.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://spring:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;
    }

    location /auth/ {
        proxy_pass http://spring:8080/auth/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /oauth2/ {
        proxy_pass http://spring:8080/oauth2/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /login/oauth2/ {
        proxy_pass http://spring:8080/login/oauth2/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ai/ {
        proxy_pass http://ai:8000/ai/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}