name: Trigger Backend Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend workflow
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.BACKEND_REPO_TOKEN }}" \
          https://api.github.com/repos/ghwj12/mohaeng_back/dispatches \
          -d '{"event_type":"frontend-updated"}'
