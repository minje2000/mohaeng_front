name: react deploy

# main 브랜치에 push 될 때 실행
on:
  push:
    branches: [ main ]

jobs:
  deploy:

    # GitHub가 제공하는 Ubuntu runner
    runs-on: ubuntu-latest

    steps:

    # repository 코드 checkout
    - name: Checkout repository
      uses: actions/checkout@v3

    # AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ECR 로그인
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    # React Docker 이미지 빌드
    - name: Build Docker image
      run: |
        docker build -t mohaeng-react .

    # ECR에 push하기 위해 태그 변경
    - name: Tag Docker image
      run: |
        docker tag mohaeng-react:latest \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-react:latest

    # ECR에 이미지 push
    - name: Push Docker image
      run: |
        docker push \
        ${{ secrets.ECR_REGISTRY }}/mohaeng-react:latest

    # EC2 서버에 SSH 접속 후 배포
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}      # EC2 public IP
        username: ${{ secrets.EC2_USER }}  # ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}    # pem key
        script: |

          # docker-compose 위치로 이동
          cd deploy

          # ECR 로그인
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
          --username AWS \
          --password-stdin \
          ${{ secrets.ECR_REGISTRY }}

          # 최신 이미지 pull
          docker compose pull react

          # 컨테이너 재시작
          docker compose up -d react
