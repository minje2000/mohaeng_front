server {

    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://spring:8080/api/;
    }

    location /auth/ {
        proxy_pass http://spring:8080/auth/;
    }

    location /ai/ {
        proxy_pass http://spring:8080/ai/;
    }

}