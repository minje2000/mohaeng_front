name: react deploy

# main 브랜치에 push 될 때 실행
on:
  push:
    branches: [ main ]

jobs:
  deploy:

    # GitHub가 제공하는 Ubuntu runner
    runs-on: ubuntu-latest

    steps:

    # repository 코드 checkout
    - name: Checkout repository
      uses: actions/checkout@v3

    # AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # React 빌드
    - name: Build React
      run: |
        npm ci
        EXTEND_ESLINT=true npm run build

    # 빌드 결과를 EC2 서버로 복사
    - name: Copy build to EC2
      uses: appleboy/scp-action@v0.1.0
      with:
        host: ${{ secrets.EC2_HOST }}      
        username: ${{ secrets.EC2_USER }}  
        key: ${{ secrets.EC2_SSH_KEY }}   
        source: "react/build/*"            # 빌드된 정적 파일만 복사
        target: "/usr/share/nginx/html/"   # Nginx 루트 디렉토리

    # EC2 서버에서 Nginx reload
    - name: Reload Nginx
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl reload nginx
